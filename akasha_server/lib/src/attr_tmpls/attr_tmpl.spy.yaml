class: AttributeTmpl
table: attribute_tmpls
fields:
    ### The public ID.
    id: UuidValue?, defaultPersist=random_v7
    name: String
    description: String?
    valueType: String
    defaultValue: String
    required: bool
    accessLevel: AccessLevel?, required, relation
indexes:
    attr_tmpl_name_desc_uniq_idx:
        fields: name, description
        unique: true
