class: EntityTmplAttribute
table: entity_tmpl_attributes

fields:
    entityTmplId: UuidValue
    entityTmpl: EntityTmpl?, relation(name=entity_tmpl_attributes, field=entityTmplId)

    attributeTmplId: UuidValue
    attributeTmpl: AttributeTmpl?, relation(field=attributeTmplId)

    orderIdx: int

indexes:
    entity_tmpl_attribute_unique_idx:
        fields: entityTmplId, attributeTmplId
        unique: true
    entity_tmpl_attribute_order_idx_unique_idx:
        fields: entityTmplId, orderIdx
        unique: true
