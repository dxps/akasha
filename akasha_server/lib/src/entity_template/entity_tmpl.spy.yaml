class: EntityTmpl
extends: HasId
table: entity_tmpls

fields:
    name: String
    description: String?

    attributes: List<EntityTmplAttribute>?, relation(name=entity_tmpl_attributes)

    ### The links where this entity template is the source.
    outgoingLinks: List<EntityTmplLink>?, relation(name=entity_tmpl_outgoing_links)

    ### Optional reverse traversal: links where this entity template is a target.
    incomingLinks: List<EntityTmplLink>?, relation(name=entity_tmpl_incoming_links)

indexes:
    entity_tmpl_name_desc_uniq_idx:
        fields: name, description
        unique: true
