class: EntityTmpl
table: entity_tmpls

fields:
    ### The public ID.
    id: UuidValue?, defaultPersist=random_v7

    name: String
    description: String?

    attributeLinks: List<EntityTmplAttribute>?, relation(name=entity_tmpl_attributes)

    ### The links where this entity template is the source.
    outgoingLinks: List<EntityTmplLink>?, relation(name=entity_tmpl_outgoing_links)

    ### Optional reverse traversal: links where this entity template is a target.
    incomingLinkTargets: List<EntityTmplLink>?, relation(name=entity_tmpl_incoming_links)

indexes:
    entity_tmpl_name_desc_uniq_idx:
        fields: name, description
        unique: true
