class: Entity
extends: HasId
table: entities

fields:
    ### The attribute (the name and its value) that is presented in the listing of entities.
    listingAttribute: (String, String)

    ### The order of attributes. Each list item is a tuple of (order-idx, attribute-type).
    attributesOrder: List<(int, String)>

    textAttributes: List<TextAttribute>
    numberAttributes: List<NumberAttribute>
    boolAttributes: List<BoolAttribute>
    dateAttributes: List<DateAttribute>
    dateTimeAttributes: List<DateTimeAttribute>

    outgoingLinks: List<EntityLink>?, relation(name=entity_outgoing_links)

    incomingLinks: List<EntityLink>?, relation(name=entity_incoming_links)
